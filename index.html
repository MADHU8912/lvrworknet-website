<!DOCTYPE html>
<html>
<head>

<title>LVRWORKNET Order System</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{
width:600px;
margin:auto;
background:white;
color:black;
padding:25px;
margin-top:40px;
border-radius:12px;
box-shadow:0px 0px 15px rgba(0,0,0,0.4);
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
color:#2c5364;
margin-bottom:10px;
}

.contact{
text-align:center;
margin-bottom:20px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#2c5364;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

button:hover{
background:#1c3545;
}

.logbox{
background:#f1f1f1;
padding:10px;
height:120px;
overflow:auto;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">LVRWORKNET</div>

<div class="contact">
Contact Number: 010102030
</div>

<form id="orderForm">

<label>Reference Number</label>
<input type="text" id="ref" placeholder="REF-0001">

<label>Customer Name</label>
<input type="text" id="name">

<label>Contact Number</label>
<input type="text" id="phone">

<label>Email</label>
<input type="email" id="email">

<label>Order Number</label>
<input type="text" id="order">

<label>Order Status</label>
<input type="text" id="status" placeholder="Processing / Completed">

<label>Requirements</label>
<textarea id="req"></textarea>

<button type="button" onclick="addLog()">Submit Order</button>

</form>

<h3>Activity Log</h3>

<div class="logbox" id="log"></div>

</div>

<script>

function addLog(){

let ref=document.getElementById("ref").value;
let name=document.getElementById("name").value;
let order=document.getElementById("order").value;

let log=document.getElementById("log");

let time=new Date().toLocaleTimeString();

log.innerHTML +=
time+" | Ref:"+ref+
" | Customer:"+name+
" | Order:"+order+"<br>";

}

</script>

</body>
</html>
