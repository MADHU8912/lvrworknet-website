<!DOCTYPE html>
<html>
<head>
<title>LVRWORKNET Order Page</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:50px;
border-radius:10px;
}

h1{
text-align:center;
color:#333;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#007BFF;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:5px;
}

button:hover{
background:#0056b3;
}
</style>

</head>

<body>

<div class="container">

<h1>LVRWORKNET</h1>

<p><b>Contact Number:</b> 010102030</p>

<form>

<label>Customer Name</label>
<input type="text" placeholder="Enter customer name">

<label>Contact Number</label>
<input type="text" placeholder="Enter contact number">

<label>Email</label>
<input type="email" placeholder="Enter email">

<label>Order Number</label>
<input type="text" placeholder="Enter order number">

<label>Order Status</label>
<input type="text" placeholder="Processing / Completed">

<label>Requirements</label>
<textarea placeholder="Enter requirements"></textarea>

<button type="submit">Submit Order</button>

</form>

</div>

</body>
</html>
